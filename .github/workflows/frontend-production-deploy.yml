name: Frontend Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-production-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Test, build and deploy frontend
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@54.14.2

      - name: Pull Vercel production environment
        working-directory: frontend
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend production artifact
        working-directory: frontend
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
