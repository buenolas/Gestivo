name: API Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/api-production-deploy.yml"
      - "backend/vercel.json"
      - ".vercelignore"
  workflow_dispatch:

concurrency:
  group: api-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, migrate and deploy API
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      API_PRODUCTION_DOMAINS: "gestao-financeira-api-six.vercel.app gestao-financeira-api-bubas-software.vercel.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vercel API secrets
        shell: bash
        run: |
          missing=()
          [[ -n "$VERCEL_TOKEN" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "$VERCEL_ORG_ID" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "$VERCEL_PROJECT_ID" ]] || missing+=("VERCEL_API_PROJECT_ID")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secret(s): %s\n' "${missing[*]}" >&2
            printf 'Set them in GitHub > Settings > Secrets and variables > Actions before deploying the API.\n' >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run critical backend tests
        working-directory: backend
        run: >
          python -m pytest
          tests/test_deployment.py
          tests/test_financial_transactions.py
          tests/test_dashboard.py
          tests/test_import_batches.py
          tests/test_exports.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@54.14.2

      - name: Pull Vercel production environment
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel env pull backend/.env.production.local --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Run production migrations
        working-directory: backend
        shell: bash
        run: |
          load_vercel_env() {
            while IFS='=' read -r key value; do
              key="${key//$'\r'/}"
              value="${value//$'\r'/}"
              [[ -z "$key" || "$key" == \#* ]] && continue
              value="${value%\"}"
              value="${value#\"}"
              if [[ -n "$value" ]]; then
                export "$key=$value"
              fi
            done < .env.production.local

            export APP_ENV="${APP_ENV:-production}"
            export APP_DEBUG="${APP_DEBUG:-false}"
            export ACCESS_TOKEN_EXPIRE_MINUTES="${ACCESS_TOKEN_EXPIRE_MINUTES:-60}"
            export EMAIL_DELIVERY_MODE="${EMAIL_DELIVERY_MODE:-mock}"
            export EMAIL_VERIFICATION_TOKEN_EXPIRE_MINUTES="${EMAIL_VERIFICATION_TOKEN_EXPIRE_MINUTES:-60}"
            export PASSWORD_RESET_CODE_EXPIRE_MINUTES="${PASSWORD_RESET_CODE_EXPIRE_MINUTES:-15}"
            export PASSWORD_RESET_RESEND_INTERVAL_SECONDS="${PASSWORD_RESET_RESEND_INTERVAL_SECONDS:-60}"
          }

          load_vercel_env
          python -m alembic upgrade head

      - name: Verify database is at Alembic head
        working-directory: backend
        shell: bash
        run: |
          load_vercel_env() {
            while IFS='=' read -r key value; do
              key="${key//$'\r'/}"
              value="${value//$'\r'/}"
              [[ -z "$key" || "$key" == \#* ]] && continue
              value="${value%\"}"
              value="${value#\"}"
              if [[ -n "$value" ]]; then
                export "$key=$value"
              fi
            done < .env.production.local

            export APP_ENV="${APP_ENV:-production}"
            export APP_DEBUG="${APP_DEBUG:-false}"
            export ACCESS_TOKEN_EXPIRE_MINUTES="${ACCESS_TOKEN_EXPIRE_MINUTES:-60}"
            export EMAIL_DELIVERY_MODE="${EMAIL_DELIVERY_MODE:-mock}"
            export EMAIL_VERIFICATION_TOKEN_EXPIRE_MINUTES="${EMAIL_VERIFICATION_TOKEN_EXPIRE_MINUTES:-60}"
            export PASSWORD_RESET_CODE_EXPIRE_MINUTES="${PASSWORD_RESET_CODE_EXPIRE_MINUTES:-15}"
            export PASSWORD_RESET_RESEND_INTERVAL_SECONDS="${PASSWORD_RESET_RESEND_INTERVAL_SECONDS:-60}"
          }

          load_vercel_env
          python -m app.scripts.check_alembic_head

      - name: Deploy API to Vercel production
        id: deploy
        shell: bash
        run: |
          deployment_output="$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | grep -Eo 'https?://[^[:space:]]+|[a-zA-Z0-9.-]+\.vercel\.app' | tail -n 1)"

          if [[ -z "$deployment_url" ]]; then
            printf 'Could not find the Vercel deployment URL in CLI output.\n' >&2
            exit 1
          fi

          printf 'deployment_url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Point production API domains to this deployment
        shell: bash
        run: |
          for domain in $API_PRODUCTION_DOMAINS; do
            vercel alias set "${{ steps.deploy.outputs.deployment_url }}" "$domain" --token="$VERCEL_TOKEN"
            vercel inspect "$domain" --token="$VERCEL_TOKEN"
          done
