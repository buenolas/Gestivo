name: API Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/api-production-deploy.yml"
      - "backend/vercel.json"
      - ".vercelignore"

concurrency:
  group: api-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Test, migrate and deploy API
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run critical backend tests
        working-directory: backend
        run: >
          python -m pytest
          tests/test_deployment.py
          tests/test_financial_transactions.py
          tests/test_dashboard.py
          tests/test_import_batches.py
          tests/test_exports.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@54.14.2

      - name: Pull Vercel production environment
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel env pull backend/.env.production.local --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Run production migrations
        working-directory: backend
        shell: bash
        run: |
          set -a
          source .env.production.local
          set +a
          python -m alembic upgrade head

      - name: Verify database is at Alembic head
        working-directory: backend
        shell: bash
        run: |
          set -a
          source .env.production.local
          set +a
          python -m app.scripts.check_alembic_head

      - name: Build Vercel production artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
